<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Keys 設定 - AI 午餐推薦系統</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #111827;
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #f9fafb;
      line-height: 1.6;
      min-height: 100vh;
    }

    .settings-container {
      max-width: 800px;
      margin: 20px auto;
      background: #1f2937;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      border: 1px solid #374151;
    }

    .settings-header-wrapper {
      position: relative;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .settings-header-wrapper .title {
      font-size: 1.3em;
      font-weight: bold;
    }

    .settings-header-wrapper .subtitle {
      font-size: 0.8em;
      font-weight: normal;
      margin-top: 5px;
      color: rgba(255, 255, 255, 0.8);
    }

    .settings-header-wrapper .nav-link {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      text-decoration: none;
      font-size: 0.85em;
      background: rgba(255, 255, 255, 0.15);
      padding: 6px 14px;
      border-radius: 20px;
      transition: background 0.3s;
    }

    .settings-header-wrapper .nav-link:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .settings-body {
      padding: 25px;
    }

    .section {
      margin-bottom: 30px;
      animation: fadeIn 0.5s ease-in;
    }

    .section-title {
      font-size: 1.15em;
      font-weight: bold;
      color: #f9fafb;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #7c3aed;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .import-area textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px;
      border: 1px solid #374151;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Consolas', 'Courier New', monospace;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s;
      box-sizing: border-box;
      line-height: 1.5;
      background: #374151;
      color: #f9fafb;
    }

    .import-area textarea::placeholder {
      color: #9ca3af;
    }

    .import-area textarea:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.3);
    }

    .import-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: transform 0.2s, opacity 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, #059669, #10b981);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
      padding: 5px 14px;
      font-size: 12px;
    }

    .btn-secondary {
      background: #374151;
      color: #f9fafb;
      border: 1px solid #4b5563;
    }

    .btn-secondary:hover {
      background: #4b5563;
    }

    .import-result {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.95em;
      display: none;
    }

    .import-result.success {
      display: block;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #6ee7b7;
    }

    .import-result.error {
      display: block;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    /* Key status table */
    .key-table-wrapper {
      overflow-x: auto;
    }

    .key-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95em;
    }

    .key-table thead {
      background: rgba(124, 58, 237, 0.2);
    }

    .key-table th {
      padding: 12px 16px;
      text-align: left;
      font-weight: bold;
      color: #c4b5fd;
      border-bottom: 2px solid #7c3aed;
    }

    .key-table td {
      padding: 10px 16px;
      border-bottom: 1px solid #374151;
      vertical-align: middle;
      color: #f9fafb;
    }

    .key-table td code {
      background: #374151;
      padding: 2px 8px;
      border-radius: 6px;
      color: #c4b5fd;
      font-size: 0.95em;
    }

    .key-table tbody tr:hover {
      background: rgba(124, 58, 237, 0.08);
    }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.85em;
      font-weight: bold;
    }

    .status-active {
      background: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
    }

    .status-cooldown {
      background: rgba(245, 158, 11, 0.2);
      color: #fcd34d;
    }

    .status-disabled {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .empty-table {
      text-align: center;
      padding: 30px;
      color: #9ca3af;
      font-size: 0.95em;
    }

    /* Usage stats */
    .usage-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .usage-card {
      background: #374151;
      border: 1px solid #4b5563;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }

    .usage-card .period {
      font-size: 0.85em;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .usage-card .value {
      font-size: 1.6em;
      font-weight: bold;
      color: #f9fafb;
    }

    .usage-card .label {
      font-size: 0.8em;
      color: #9ca3af;
      margin-top: 2px;
    }

    .usage-card .token-info {
      font-size: 0.85em;
      color: #a78bfa;
      margin-top: 6px;
    }

    .refresh-info {
      font-size: 0.8em;
      color: #9ca3af;
      text-align: right;
      margin-top: 8px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .settings-container {
        margin: 10px;
        border-radius: 15px;
      }

      .settings-body {
        padding: 15px;
      }

      .settings-header-wrapper .nav-link {
        position: static;
        transform: none;
        display: inline-block;
        margin-top: 10px;
      }

      .import-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        text-align: center;
      }

      .usage-cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="settings-container">
    <div class="settings-header-wrapper">
      <a href="/ai_lunch" class="nav-link">&larr; 主頁面</a>
      <div class="title">API Keys 設定</div>
      <div class="subtitle">Gemini API Key 管理與用量追蹤</div>
    </div>

    <div class="settings-body">
      <!-- Import Section -->
      <div class="section">
        <div class="section-title">匯入 API Keys</div>
        <div class="import-area">
          <textarea id="keysInput" placeholder="貼上 API Keys，一行一把..."></textarea>
          <div class="import-actions">
            <button class="btn btn-primary" id="btnImport" onclick="importKeys(false)">匯入 Keys</button>
            <button class="btn btn-success" id="btnImportValidate" onclick="importKeys(true)">匯入並驗證</button>
          </div>
          <div class="import-result" id="importResult"></div>
        </div>
      </div>

      <!-- Key Status Table -->
      <div class="section">
        <div class="section-title">Key 狀態一覽</div>
        <div class="key-table-wrapper">
          <table class="key-table">
            <thead>
              <tr>
                <th>後4碼</th>
                <th>狀態</th>
                <th>今日用量</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="keyTableBody">
              <tr>
                <td colspan="4" class="empty-table">載入中...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="refresh-info" id="refreshInfo">每 10 秒自動刷新</div>
      </div>

      <!-- Usage Stats -->
      <div class="section">
        <div class="section-title">使用統計</div>
        <div class="usage-cards" id="usageCards">
          <div class="usage-card">
            <div class="period">今日</div>
            <div class="value" id="usageToday">--</div>
            <div class="label">呼叫次數</div>
            <div class="token-info" id="tokensToday">-- tokens</div>
          </div>
          <div class="usage-card">
            <div class="period">近 7 天</div>
            <div class="value" id="usage7d">--</div>
            <div class="label">呼叫次數</div>
            <div class="token-info" id="tokens7d">-- tokens</div>
          </div>
          <div class="usage-card">
            <div class="period">近 30 天</div>
            <div class="value" id="usage30d">--</div>
            <div class="label">呼叫次數</div>
            <div class="token-info" id="tokens30d">-- tokens</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let refreshInterval = null;

    // Import keys
    async function importKeys(validate) {
      const text = document.getElementById('keysInput').value.trim();
      if (!text) {
        showImportResult('請先貼上 API Keys', 'error');
        return;
      }

      const btnImport = document.getElementById('btnImport');
      const btnImportValidate = document.getElementById('btnImportValidate');
      btnImport.disabled = true;
      btnImportValidate.disabled = true;

      try {
        const response = await fetch('/api/keys/import', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keys: text, validate: validate })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || '匯入失敗');
        }

        const added = data.added ?? 0;
        const duplicated = data.duplicated ?? 0;
        const invalid = data.invalid ?? 0;
        showImportResult(`新增 ${added} 把 / 重複 ${duplicated} 把 / 無效 ${invalid} 把`, 'success');
        document.getElementById('keysInput').value = '';

        // Refresh table after import
        refreshKeyStatus();
      } catch (error) {
        showImportResult(`匯入失敗：${error.message}`, 'error');
      } finally {
        btnImport.disabled = false;
        btnImportValidate.disabled = false;
      }
    }

    function showImportResult(message, type) {
      const el = document.getElementById('importResult');
      el.textContent = message;
      el.className = `import-result ${type}`;
    }

    // Key status table
    async function refreshKeyStatus() {
      try {
        const response = await fetch('/api/keys/status');
        const data = await response.json();

        const tbody = document.getElementById('keyTableBody');

        if (!response.ok) {
          tbody.innerHTML = `<tr><td colspan="4" class="empty-table">無法載入：${data.detail || '未知錯誤'}</td></tr>`;
          return;
        }

        const keys = data.keys ?? data ?? [];

        if (!Array.isArray(keys) || keys.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty-table">尚未匯入任何 API Key</td></tr>';
          return;
        }

        tbody.innerHTML = keys.map(key => {
          let statusHtml = '';
          const status = key.status || 'unknown';

          if (status === 'active' || status === 'available') {
            statusHtml = '<span class="status-badge status-active">&#10003; 可用</span>';
          } else if (status === 'cooldown') {
            const remaining = key.cooldown_remaining ?? key.remaining_seconds ?? '?';
            statusHtml = `<span class="status-badge status-cooldown">&#9199;&#65039; 冷卻中 (${remaining}s)</span>`;
          } else if (status === 'disabled' || status === 'invalid') {
            statusHtml = '<span class="status-badge status-disabled">&#10060; 停用</span>';
          } else {
            statusHtml = `<span class="status-badge">${status}</span>`;
          }

          const suffix = key.suffix || key.last4 || '????';
          const todayUsage = key.today_usage ?? key.usage_today ?? 0;

          return `
            <tr>
              <td><code>${suffix}</code></td>
              <td>${statusHtml}</td>
              <td>${todayUsage}</td>
              <td><button class="btn btn-danger" onclick="deleteKey('${suffix}')">刪除</button></td>
            </tr>
          `;
        }).join('');

        // Update refresh timestamp
        const now = new Date();
        document.getElementById('refreshInfo').textContent =
          `上次刷新：${now.toLocaleTimeString('zh-TW')}（每 10 秒自動刷新）`;

      } catch (error) {
        const tbody = document.getElementById('keyTableBody');
        tbody.innerHTML = `<tr><td colspan="4" class="empty-table">連線失敗：${error.message}</td></tr>`;
      }
    }

    // Delete a key
    async function deleteKey(suffix) {
      if (!confirm(`確定要刪除後4碼為「${suffix}」的 Key 嗎？`)) return;

      try {
        const response = await fetch(`/api/keys/${suffix}`, { method: 'DELETE' });
        if (!response.ok) {
          const data = await response.json();
          throw new Error(data.detail || '刪除失敗');
        }
        refreshKeyStatus();
      } catch (error) {
        alert(`刪除失敗：${error.message}`);
      }
    }

    // Usage stats
    async function refreshUsageStats() {
      try {
        const response = await fetch('/api/keys/usage');
        const data = await response.json();

        if (!response.ok) return;

        const today = data.today ?? data['1d'] ?? {};
        const week = data['7d'] ?? data.week ?? {};
        const month = data['30d'] ?? data.month ?? {};

        document.getElementById('usageToday').textContent = today.calls ?? today.count ?? '--';
        document.getElementById('tokensToday').textContent = formatTokens(today.tokens ?? today.total_tokens);

        document.getElementById('usage7d').textContent = week.calls ?? week.count ?? '--';
        document.getElementById('tokens7d').textContent = formatTokens(week.tokens ?? week.total_tokens);

        document.getElementById('usage30d').textContent = month.calls ?? month.count ?? '--';
        document.getElementById('tokens30d').textContent = formatTokens(month.tokens ?? month.total_tokens);
      } catch (error) {
        // Silently fail for usage stats
      }
    }

    function formatTokens(tokens) {
      if (tokens === undefined || tokens === null) return '-- tokens';
      if (tokens >= 1000000) return `${(tokens / 1000000).toFixed(1)}M tokens`;
      if (tokens >= 1000) return `${(tokens / 1000).toFixed(1)}K tokens`;
      return `${tokens} tokens`;
    }

    // Initialize
    window.addEventListener('load', function() {
      refreshKeyStatus();
      refreshUsageStats();

      // Auto-refresh every 10 seconds
      refreshInterval = setInterval(() => {
        refreshKeyStatus();
        refreshUsageStats();
      }, 10000);
    });
  </script>
</body>
</html>
