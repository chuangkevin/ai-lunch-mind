<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍱 AI 午餐推薦系統</title>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #333;
      line-height: 1.6;
    }
    
    .chat-container {
      max-width: 600px;
      margin: 20px auto;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
    }
    
    .chat-header {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 1.3em;
      font-weight: bold;
      position: relative;
    }
    
    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #f8f9fa;
    }
    
    .message {
      margin-bottom: 15px;
      animation: fadeIn 0.5s ease-in;
    }
    
    .message.user {
      text-align: right;
    }
    
    .message.bot {
      text-align: left;
    }
    
    .message-content {
      display: inline-block;
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      word-wrap: break-word;
    }
    
    .message.user .message-content {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    
    .message.bot .message-content {
      background: #e9ecef;
      color: #333;
      border: 1px solid #dee2e6;
    }
    
    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #dee2e6;
      display: flex;
      gap: 10px;
    }
    
    .input-area textarea {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #dee2e6;
      border-radius: 15px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
      resize: vertical;
      min-height: 20px;
      max-height: 100px;
      font-family: inherit;
      line-height: 1.4;
    }
    
    .input-area textarea:focus {
      border-color: #667eea;
    }
    
    .input-area button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s;
    }
    
    .input-area button:hover {
      transform: translateY(-2px);
    }
    
    .input-area button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #geoButton {
      padding: 10px 14px;
      background: linear-gradient(135deg, #43a047, #2e7d32);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      transition: transform 0.2s, background 0.3s;
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #geoButton:hover { transform: translateY(-2px); }
    #geoButton.loading { animation: pulse 1s infinite; background: linear-gradient(135deg, #fb8c00, #e65100); }
    #geoButton.located { background: linear-gradient(135deg, #00897b, #004d40); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    
    .restaurant-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin: 10px 0;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      border-left: 4px solid #667eea;
    }
    
    .restaurant-name {
      font-size: 1.2em;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }
    
    .restaurant-info {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 0.9em;
      color: #666;
    }
    
    .restaurant-info span {
      background: #f8f9fa;
      padding: 4px 8px;
      border-radius: 12px;
      border: 1px solid #dee2e6;
    }
    
    .recommendation-score {
      background: linear-gradient(135deg, #28a745, #20c997) !important;
      color: white !important;
      font-weight: bold;
    }
    
    .weather-warning {
      background: #fff3cd;
      border: 1px solid #ffeaa7;
      color: #856404;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 8px;
      font-size: 0.85em;
    }
    
    .restaurant-url {
      margin-top: 8px;
    }
    
    .restaurant-url a {
      color: #667eea;
      text-decoration: none;
      font-size: 0.9em;
    }
    
    .restaurant-url a:hover {
      text-decoration: underline;
    }

    .restaurant-ai-reason {
      font-style: italic;
      font-size: 0.85em;
      color: #555;
      margin: 6px 0;
      padding-left: 4px;
      border-left: 3px solid #667eea;
      padding: 4px 0 4px 10px;
    }

    .social-proof-badge {
      display: inline-block;
      background: linear-gradient(135deg, #fdcb6e, #f39c12);
      color: #fff;
      font-size: 0.78em;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .estimated-price-tag {
      background: #fff3e0;
      border: 1px solid #ffe0b2;
      color: #e65100;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.85em;
    }

    .relevance-badge {
      background: #ede7f6;
      border: 1px solid #d1c4e9;
      color: #5e35b1;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.8em;
      font-weight: 600;
    }
    
    .distance-link {
      color: #007bff !important;
      text-decoration: none !important;
      font-weight: bold !important;
      transition: color 0.2s ease;
    }
    
    .distance-link:hover {
      color: #0056b3 !important;
      text-decoration: underline !important;
    }
    
    .weather-summary {
      background: linear-gradient(135deg, #74b9ff, #0984e3);
      color: white;
      padding: 15px;
      border-radius: 12px;
      margin: 10px 0;
      text-align: center;
    }
    
    .recommendation-summary {
      background: #e8f5e8;
      border: 1px solid #c3e6cb;
      color: #155724;
      padding: 12px;
      border-radius: 8px;
      margin: 10px 0;
      font-size: 0.95em;
    }
    
    .quick-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 15px 0;
    }
    
    .quick-suggestion {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      padding: 8px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85em;
      transition: all 0.3s;
    }
    
    .quick-suggestion:hover {
      background: #667eea;
      color: white;
      transform: translateY(-1px);
    }
    
    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
    
    .loading::after {
      content: '';
      animation: loading 1.5s infinite;
    }
    
    @keyframes loading {
      0%, 33% { content: '🔍 分析中'; }
      34%, 66% { content: '🔍 分析中.'; }
      67%, 100% { content: '🔍 分析中..'; }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .intro-message {
      background: #e8f4fd;
      border: 1px solid #bee5eb;
      color: #0c5460;
      padding: 15px;
      border-radius: 12px;
      margin: 10px 0;
    }
    
    .intro-message h4 {
      margin: 0 0 10px 0;
      color: #0c5460;
    }
    
    .intro-message ul {
      margin: 8px 0;
      padding-left: 20px;
    }
    
    @media (max-width: 768px) {
      .chat-container {
        margin: 10px;
        height: 95vh;
      }
      
      .restaurant-info {
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      🍱 AI 午餐推薦系統
      <a href="/settings" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: white; text-decoration: none; font-size: 0.7em; font-weight: normal; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 15px;">⚙️ 設定</a>
      <div style="font-size: 0.8em; font-weight: normal; margin-top: 5px;">
        智能整合天氣・流汗指數・餐廳搜尋
      </div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
      <div class="message bot">
        <div class="message-content">
          <div class="intro-message">
            <h4>🤖 歡迎使用 AI 午餐推薦系統！</h4>
            <p>我會根據您的位置、天氣狀況和個人喜好，智能推薦最適合的餐廳。</p>
            
            <h4>🎯 支援的輸入方式：</h4>
            <ul>
              <li><strong>位置 + 需求：</strong>"我在台北101，想吃火鍋"</li>
              <li><strong>地址搜尋：</strong>"台北市信義區附近的日式料理"</li>
              <li><strong>地標搜尋：</strong>"西門町的甜點店"</li>
            </ul>
            
            <h4>🧠 智能推薦特色：</h4>
            <ul>
              <li>📊 根據流汗指數調整搜尋範圍</li>
              <li>🌡️ 依據天氣條件過濾餐點類型</li>
              <li>📍 自動計算距離並排序</li>
              <li>🌧️ 降雨提醒與建議</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
    
    <div class="quick-suggestions">
      <div class="quick-suggestion" onclick="sendQuickMessage('我在台北車站，想吃拉麵')">台北車站拉麵</div>
      <div class="quick-suggestion" onclick="sendQuickMessage('我在信義區，天氣熱想吃冰')">信義區冰品</div>
      <div class="quick-suggestion" onclick="sendQuickMessage('我在西門町，找燒烤店')">西門町燒烤</div>
      <div class="quick-suggestion" onclick="sendQuickMessage('我在中山區，想吃義大利麵')">中山區義大利麵</div>
      <div class="quick-suggestion" onclick="sendQuickMessage('我在台北101附近')">根據時間推薦</div>
    </div>
    
    <div class="input-area">
      <button onclick="requestGeolocation()" id="geoButton" title="取得目前位置">📍</button>
      <textarea id="userInput" placeholder="告訴我您的位置和想吃什麼... (Shift+Enter 換行，Enter 送出)" rows="1" onkeydown="handleKeyDown(event)"></textarea>
      <button onclick="sendMessage()" id="sendButton">推薦</button>
    </div>
  </div>

  <script>
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendButton = document.getElementById('sendButton');
    const geoButton = document.getElementById('geoButton');

    // --- Location Management ---
    let userCoords = null; // {lat, lng, address, source: 'gps'|'manual'|'chat'}

    // Restore manual location from localStorage on page load
    const savedManualLocation = localStorage.getItem('manual_location');
    if (savedManualLocation) {
      userCoords = { lat: null, lng: null, address: savedManualLocation, source: 'manual' };
    }

    function setLocation(address, source, lat, lng) {
      userCoords = { lat: lat || null, lng: lng || null, address, source };
      // Persist manual/chat locations so GPS doesn't override on reload
      if (source === 'manual' || source === 'chat') {
        localStorage.setItem('manual_location', address);
      }
      updateLocationBar();
    }

    function updateLocationBar() {
      let bar = document.getElementById('locationBar');
      if (!bar) {
        bar = document.createElement('div');
        bar.id = 'locationBar';
        bar.style.cssText = 'padding:8px 16px;background:#e8f5e9;border-bottom:1px solid #c8e6c9;display:flex;align-items:center;gap:8px;font-size:13px;color:#2e7d32;';
        const chatContainer = document.querySelector('.chat-container');
        const chatMsgs = document.getElementById('chatMessages');
        chatContainer.insertBefore(bar, chatMsgs);
      }
      if (!userCoords) {
        bar.style.display = 'none';
        return;
      }
      bar.style.display = 'flex';
      const sourceLabel = userCoords.source === 'gps' ? 'GPS' : userCoords.source === 'chat' ? '對話' : '手動';
      bar.innerHTML = `
        <span>📍 <strong>${userCoords.address}</strong></span>
        <span style="color:#81c784;font-size:11px;">(${sourceLabel})</span>
        <button onclick="promptManualLocation()" style="margin-left:auto;padding:2px 10px;border:1px solid #81c784;border-radius:12px;background:white;color:#2e7d32;cursor:pointer;font-size:12px;">修正</button>
        <button onclick="clearLocation()" style="padding:2px 10px;border:1px solid #ef9a9a;border-radius:12px;background:white;color:#c62828;cursor:pointer;font-size:12px;">清除</button>
      `;
    }

    function clearLocation() {
      userCoords = null;
      localStorage.removeItem('manual_location');
      geoButton.classList.remove('located');
      const bar = document.getElementById('locationBar');
      if (bar) bar.style.display = 'none';
      addMessage('<small>📍 位置已清除。您可以重新定位或在訊息中指定位置。</small>');
    }

    function promptManualLocation() {
      const addr = prompt('請輸入您的位置（地標、地址或路口）：', userCoords ? userCoords.address : '');
      if (addr && addr.trim()) {
        setLocation(addr.trim(), 'manual');
        addMessage(`
          <div style="color:#1b5e20;background:#e8f5e9;padding:10px;border-radius:10px;border-left:4px solid #4caf50;">
            📍 位置已更新為：<strong>${addr.trim()}</strong>
          </div>
        `);
      }
    }

    // Detect location mentioned in user's chat message
    function extractLocationFromMessage(msg) {
      // "我在XXX" pattern
      const atMatch = msg.match(/我在([^\s，。！？,]{2,20})/);
      if (atMatch) return atMatch[1];
      // "XXX附近" pattern
      const nearMatch = msg.match(/([^\s，。！？,]{2,15})附近/);
      if (nearMatch) return nearMatch[1];
      return null;
    }

    function requestGeolocation() {
      if (!navigator.geolocation) {
        addMessage('您的瀏覽器不支援定位功能，請手動輸入位置。');
        return;
      }
      geoButton.classList.add('loading');
      geoButton.textContent = '...';
      addMessage('📡 正在取得您的位置...');

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          let address = `${lat.toFixed(5)},${lng.toFixed(5)}`;

          // Reverse geocode
          try {
            const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=zh-TW&zoom=18`);
            const data = await resp.json();
            if (data.address) {
              // Build a shorter, more useful address
              const a = data.address;
              const parts = [a.road, a.neighbourhood, a.suburb || a.city_district, a.city || a.county].filter(Boolean);
              address = parts.join(', ') || data.display_name;
            }
          } catch (e) {
            console.warn('Reverse geocode failed', e);
          }

          geoButton.classList.remove('loading');
          geoButton.classList.add('located');
          geoButton.textContent = '📍';
          setLocation(address, 'gps', lat, lng);
          addMessage(`
            <div style="color:#1b5e20;background:#e8f5e9;padding:12px;border-radius:10px;border-left:4px solid #4caf50;">
              <strong>📍 已取得您的位置</strong><br>
              ${address}<br><br>
              <small>GPS 定位可能有誤差，如不準確請點上方 <strong>修正</strong> 按鈕手動輸入。</small><br>
              <small>在對話中提到的地點（如「我在台北101」）會自動覆蓋 GPS 位置。</small>
            </div>
          `);
        },
        (err) => {
          geoButton.classList.remove('loading');
          geoButton.textContent = '📍';
          let msg = '定位失敗。';
          if (err.code === 1) msg = '您拒絕了定位權限。';
          else if (err.code === 2) msg = '無法取得位置資訊。';
          else if (err.code === 3) msg = '定位超時。';
          addMessage(`
            <div style="color:#b71c1c;background:#ffebee;padding:12px;border-radius:10px;border-left:4px solid #f44336;">
              <strong>⚠️ ${msg}</strong><br>
              <small>點 📍 重試，或點下方按鈕手動輸入位置。</small><br><br>
              <button onclick="promptManualLocation()" style="padding:6px 16px;border:1px solid #2196f3;border-radius:15px;background:white;color:#1565c0;cursor:pointer;">📝 手動輸入位置</button>
            </div>
          `);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
      );
    }
    
    function addMessage(content, isUser = false) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
      messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    function addLoadingMessage() {
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'message bot';
      loadingDiv.id = 'loadingMessage';
      loadingDiv.innerHTML = '<div class="message-content"><div class="loading"></div></div>';
      chatMessages.appendChild(loadingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return loadingDiv;
    }
    
    function removeLoadingMessage() {
      const loadingMsg = document.getElementById('loadingMessage');
      if (loadingMsg) {
        loadingMsg.remove();
      }
    }
    
    function formatRestaurantCard(restaurant) {
      let infoItems = [];

      if (restaurant.rating) {
        infoItems.push(`<span>⭐ ${restaurant.rating}</span>`);
      }

      // Walking distance
      if (restaurant.walking_minutes || restaurant.walking_distance) {
        let distText = '';
        if (restaurant.walking_minutes) distText += `🚶 ${restaurant.walking_minutes}分`;
        if (restaurant.walking_distance) distText += ` (${restaurant.walking_distance})`;
        infoItems.push(`<span>${distText.trim()}</span>`);
      } else if (restaurant.distance_km !== undefined && restaurant.distance_km !== null) {
        infoItems.push(`<span>📍 ${restaurant.distance_km}km</span>`);
      }

      if (restaurant.price_level) {
        infoItems.push(`<span>💰 ${restaurant.price_level}</span>`);
      }
      if (restaurant.estimated_price && restaurant.estimated_price !== restaurant.price_level) {
        infoItems.push(`<span class="estimated-price-tag">約$${restaurant.estimated_price}</span>`);
      }
      if (restaurant.relevance_score !== undefined && restaurant.relevance_score !== null) {
        infoItems.push(`<span class="relevance-badge">相關度 ${restaurant.relevance_score}/10</span>`);
      }

      // Social proof badge with platform names
      let socialProofHtml = '';
      if (restaurant.social_proof) {
        const sp = restaurant.social_proof;
        if (sp.platforms && sp.platforms.length > 0) {
          socialProofHtml = `<span class="social-proof-badge">💬 ${sp.platforms.join('/')} 熱議</span>`;
        } else {
          socialProofHtml = '<span class="social-proof-badge">💬 社群推薦</span>';
        }
      }

      let card = `
        <div class="restaurant-card">
          <div class="restaurant-name">🍽️ ${restaurant.name}${socialProofHtml}</div>
          <div class="restaurant-info">
            ${infoItems.join('')}
          </div>
      `;

      if (restaurant.address) {
        card += `<div style="color: #666; font-size: 0.9em; margin: 8px 0;">📍 ${restaurant.address}</div>`;
      }

      // AI reason
      if (restaurant.ai_reason) {
        card += `<div class="restaurant-ai-reason">🤖 ${restaurant.ai_reason}</div>`;
      }

      // Social links
      if (restaurant.social_proof && restaurant.social_proof.mentions) {
        let linksHtml = restaurant.social_proof.mentions.map(m =>
          `<a href="${m.url}" target="_blank" style="color:#7c4dff;font-size:0.8em;margin-right:8px;">${m.platform}</a>`
        ).join('');
        card += `<div style="margin-top:4px;">${linksHtml}</div>`;
      }

      // Google Maps walking directions link
      {
        const dest = encodeURIComponent(restaurant.name + ' ' + (restaurant.address || ''));
        let mapsLink;
        if (userCoords && userCoords.address) {
          const origin = encodeURIComponent(userCoords.address);
          mapsLink = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=walking`;
        } else {
          mapsLink = `https://www.google.com/maps/dir/?api=1&destination=${dest}&travelmode=walking`;
        }
        card += `<div style="margin-top: 8px;"><a href="${mapsLink}" target="_blank" style="color: #1a73e8; text-decoration: none; font-size: 0.85em;">🚶 步行導航到這裡</a></div>`;
      }

      card += '</div>';
      return card;
    }
    
    function formatWeatherSummary(weatherInfo) {
      if (!weatherInfo) return '';
      
      const temp = weatherInfo.temperature || 'N/A';
      const heatIndex = weatherInfo.heat_index || 'N/A';
      const humidity = weatherInfo.humidity || 'N/A';
      const sweatIndex = weatherInfo.sweat_index || 'N/A';
      const comfortLevel = weatherInfo.comfort_level?.level || '普通';
      
      let rainInfo = '';
      if (weatherInfo.rain_info?.probability !== 'N/A') {
        rainInfo = `<br>🌧️ 降雨機率: ${weatherInfo.rain_info.probability}`;
      }
      
      let heatIndexText = '';
      if (heatIndex !== 'N/A' && heatIndex !== temp) {
        heatIndexText = ` | 🌡️ 體感 ${heatIndex}°C`;
      }
      
      // 加入時間資訊
      const now = new Date();
      const currentTime = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
      const mealTime = getMealTimeDescription(now.getHours());
      
      return `
        <div class="weather-summary">
          ⏰ ${currentTime} (${mealTime})<br>
          🌡️ ${temp}°C${heatIndexText} | 💧 ${humidity}% | 😅 流汗指數 ${sweatIndex}/10 (${comfortLevel})${rainInfo}
        </div>
      `;
    }
    
    function getMealTimeDescription(currentHour) {
      if (currentHour >= 6 && currentHour <= 9) {
        return "早餐時段";
      } else if (currentHour >= 10 && currentHour <= 11) {
        return "早午餐時段";
      } else if (currentHour >= 12 && currentHour <= 14) {
        return "午餐時段";
      } else if (currentHour >= 15 && currentHour <= 17) {
        return "下午茶時段";
      } else if (currentHour >= 18 && currentHour <= 21) {
        return "晚餐時段";
      } else if (currentHour >= 22 || currentHour <= 2) {
        return "宵夜時段";
      } else {
        return "非用餐時段";
      }
    }
    
    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      // Location priority: 1) chat mention  2) manual/GPS saved  3) nothing
      let fullMessage = message;
      const chatLocation = extractLocationFromMessage(message);
      if (chatLocation) {
        // User mentioned a location in this message — use it and update saved location
        setLocation(chatLocation, 'chat');
      } else if (userCoords) {
        // No location in message — inject saved location
        fullMessage = `我在${userCoords.address}，${message}`;
      }

      // 添加使用者訊息 (show original, send with location)
      addMessage(message, true);
      userInput.value = '';
      sendButton.disabled = true;

      // Create a thinking container that updates in-place
      const thinkingDiv = document.createElement('div');
      thinkingDiv.className = 'message bot';
      thinkingDiv.innerHTML = '<div class="message-content"><div class="loading"></div> 正在分析...</div>';
      chatMessages.appendChild(thinkingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // Container for restaurant cards (inserted on first restaurant event)
      const restaurantContainer = document.createElement('div');
      let restaurantContainerInserted = false;

      const url = `/chat-recommendation-stream?message=${encodeURIComponent(fullMessage)}`;
      const eventSource = new EventSource(url);

      eventSource.addEventListener('thinking', (e) => {
        const data = JSON.parse(e.data);
        thinkingDiv.innerHTML = `<div class="message-content">🤔 ${data.message}</div>`;
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });

      eventSource.addEventListener('weather', (e) => {
        const data = JSON.parse(e.data);
        let weatherHtml = '<div class="message-content">';
        weatherHtml += '<div class="weather-summary" style="margin:0;">';
        if (data.temperature !== null && data.temperature !== undefined) {
          weatherHtml += `🌡️ ${data.temperature}°C`;
        }
        if (data.humidity !== null && data.humidity !== undefined) {
          weatherHtml += ` | 💧 ${data.humidity}%`;
        }
        if (data.sweat_index !== null && data.sweat_index !== undefined) {
          weatherHtml += ` | 😅 流汗指數 ${data.sweat_index}/10`;
        }
        if (data.rain_probability !== null && data.rain_probability !== undefined) {
          const rain = data.rain_probability;
          const rainIcon = rain >= 60 ? '🌧️' : rain >= 30 ? '🌦️' : '☀️';
          weatherHtml += ` | ${rainIcon} 降雨 ${rain}%`;
          if (rain >= 60) {
            weatherHtml += ' <strong style="color:#e65100;">記得帶傘！</strong>';
          }
        }
        weatherHtml += '</div></div>';
        // Insert weather as a new message before thinking
        const weatherDiv = document.createElement('div');
        weatherDiv.className = 'message bot';
        weatherDiv.innerHTML = weatherHtml;
        chatMessages.insertBefore(weatherDiv, thinkingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });

      eventSource.addEventListener('analysis', (e) => {
        const data = JSON.parse(e.data);
        const analysisDiv = document.createElement('div');
        analysisDiv.className = 'message bot';
        analysisDiv.innerHTML = `<div class="message-content" style="background:#fff3e0;border-left:4px solid #ff9800;padding:10px;border-radius:8px;">
          <strong>📏 ${data.distance_reason}</strong>
        </div>`;
        chatMessages.insertBefore(analysisDiv, thinkingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });

      eventSource.addEventListener('intent', (e) => {
        const data = JSON.parse(e.data);
        let html = '<div class="message-content" style="background:#f3e5f5;border-left:4px solid #9c27b0;padding:12px;border-radius:8px;">';
        html += `<strong>🧠 AI 分析結果</strong><br>`;
        html += `<strong>📍 位置：</strong>${data.location || '未指定'}<br>`;
        if (data.keywords && data.keywords.length > 0) {
          html += `<strong>🔑 關鍵字：</strong>${data.keywords.join(', ')}<br>`;
        }
        if (data.secondary_keywords && data.secondary_keywords.length > 0) {
          html += `<strong>🔄 備選：</strong>${data.secondary_keywords.join(', ')}<br>`;
        }
        if (data.budget && data.budget.max) {
          html += `<strong>💰 預算：</strong>${data.budget.max}元以內<br>`;
        }
        if (data.source === 'gemini') {
          html += '<small style="color:#4caf50">✨ Gemini AI 分析</small>';
        } else {
          html += '<small style="color:#ff9800">⚡ 快速分析 (fallback)</small>';
        }
        html += '</div>';
        // Insert as a SEPARATE bubble, don't overwrite thinkingDiv
        const intentDiv = document.createElement('div');
        intentDiv.className = 'message bot';
        intentDiv.innerHTML = html;
        chatMessages.insertBefore(intentDiv, thinkingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });

      eventSource.addEventListener('restaurant', (e) => {
        const data = JSON.parse(e.data);
        const card = formatRestaurantCard(data.restaurant);
        const cardWrapper = document.createElement('div');
        cardWrapper.innerHTML = card;
        restaurantContainer.appendChild(cardWrapper.firstElementChild || cardWrapper);
        if (!restaurantContainerInserted) {
          // Insert heading + container after thinking div
          const heading = document.createElement('div');
          heading.className = 'message bot';
          heading.innerHTML = '<div class="message-content"><strong>🎯 推薦餐廳：</strong></div>';
          chatMessages.appendChild(heading);
          chatMessages.appendChild(restaurantContainer);
          restaurantContainerInserted = true;
        }
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });

      eventSource.addEventListener('done', (e) => {
        const data = JSON.parse(e.data);
        const summary = document.createElement('div');
        summary.className = 'message bot';
        let timingText = '';
        if (data.timing && data.timing.total) {
          timingText = ` (${data.timing.total.toFixed(1)}秒)`;
        }
        summary.innerHTML = `<div class="message-content">✅ 共推薦 ${data.total} 間餐廳${timingText}</div>`;
        chatMessages.appendChild(summary);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        sendButton.disabled = false;
        userInput.focus();
        eventSource.close();
      });

      eventSource.addEventListener('error', (e) => {
        try {
          const data = JSON.parse(e.data);
          thinkingDiv.innerHTML = `<div class="message-content" style="color:red">❌ ${data.message}</div>`;
        } catch {
          // Server-sent error event without parseable data — connection lost
          thinkingDiv.innerHTML = '<div class="message-content" style="color:red">❌ 連線中斷</div>';
        }
        sendButton.disabled = false;
        userInput.focus();
        eventSource.close();
      });

      eventSource.onerror = () => {
        // The browser fires onerror when EventSource connection closes or fails.
        // If we already handled a 'done' or 'error' event, the source is already
        // closed, so this is a no-op. Otherwise treat as unexpected disconnect.
        if (eventSource.readyState === EventSource.CLOSED) return;
        thinkingDiv.innerHTML = '<div class="message-content" style="color:red">❌ 連線中斷，請稍後再試</div>';
        sendButton.disabled = false;
        userInput.focus();
        eventSource.close();
      };
    }
    
    function sendQuickMessage(message) {
      userInput.value = message;
      sendMessage();
    }
    
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }
    
    function handleKeyPress(event) {
      // 保留向後相容性
      if (event.key === 'Enter') {
        event.preventDefault();
        sendMessage();
      }
    }
    
    // 選擇地址位置的函數
    async function selectLocation(lat, lng, locationName, originalMessage) {
      try {
        // 顯示選擇確認
        addMessage(`✅ 已選擇位置：<strong>${locationName}</strong> (${lat}, ${lng})`);
        
        // 創建包含座標的新訊息
        const coordMessage = `${lat},${lng}`;
        
        // 添加載入訊息
        const loadingMsg = addLoadingMessage();
        
        // 第一階段：重新獲取搜尋計劃（使用座標）
        console.log('🔍 使用選定位置重新生成搜尋計劃...');
        const planResponse = await fetch(`/chat-recommendation?message=${encodeURIComponent(coordMessage)}&phase=start`);
        const planData = await planResponse.json();
        
        removeLoadingMessage();
        
        if (!planResponse.ok) {
          throw new Error(planData.detail || '搜尋計劃生成失敗');
        }
        
        // 顯示搜尋計劃
        if (planData.phase === 'plan' && planData.search_plan) {
          let planHtml = '';
          
          // 添加天氣摘要
          if (planData.weather_info) {
            planHtml += formatWeatherSummary(planData.weather_info);
          }
          
          // 添加搜尋計劃
          planHtml += `<div style="background: #e8f4fd; border: 1px solid #bee5eb; color: #0c5460; padding: 15px; border-radius: 12px; margin: 10px 0;">
            <strong>[PLAN] 搜尋計劃：</strong><br>
            ${planData.search_plan.replace(/\n/g, '<br>')}
          </div>`;
          
          addMessage(planHtml);
          
          // 短暫延遲後開始第二階段
          setTimeout(async () => {
            // 添加第二階段載入訊息
            const searchLoadingMsg = addLoadingMessage();
            
            try {
              // 第二階段：執行實際搜尋
              console.log('🔍 第二階段：執行餐廳搜尋...');
              const searchResponse = await fetch(`/chat-recommendation?message=${encodeURIComponent(coordMessage)}&phase=search`);
              const searchData = await searchResponse.json();
              
              removeLoadingMessage();
              
              if (!searchResponse.ok) {
                throw new Error(searchData.detail || '餐廳搜尋失敗');
              }
              
              // 顯示搜尋結果
              let searchHtml = '';
              
              // 添加推薦摘要
              if (searchData.recommendation_summary) {
                searchHtml += `<div class="recommendation-summary">
                  <strong>📊 推薦摘要：</strong><br>${searchData.recommendation_summary}
                </div>`;
              }
              
              // 添加餐廳推薦
              if (searchData.restaurants && searchData.restaurants.length > 0) {
                searchHtml += `<div style="margin: 15px 0;"><strong>🎯 為您推薦 ${searchData.restaurants.length} 家餐廳：</strong></div>`;
                
                searchData.restaurants.forEach(restaurant => {
                  searchHtml += formatRestaurantCard(restaurant);
                });
              } else {
                searchHtml += `<div style="color: #856404; background: #fff3cd; padding: 12px; border-radius: 8px;">
                  😅 抱歉，在指定範圍內沒有找到符合條件的餐廳。<br>
                  建議您擴大搜尋範圍或嘗試其他關鍵字。
                </div>`;
              }
              
              addMessage(searchHtml);
              
            } catch (searchError) {
              removeLoadingMessage();
              addMessage(`<div style="color: #721c24; background: #f8d7da; padding: 12px; border-radius: 8px; border: 1px solid #f5c6cb;">
                ❌ <strong>餐廳搜尋失敗：</strong>${searchError.message}<br><br>
                請稍後再試或嘗試其他關鍵字。
              </div>`);
            }
          }, 1000);
        }
        
      } catch (error) {
        removeLoadingMessage();
        addMessage(`<div style="color: #721c24; background: #f8d7da; padding: 12px; border-radius: 8px; border: 1px solid #f5c6cb;">
          ❌ <strong>位置選擇處理失敗：</strong>${error.message}<br><br>
          請重新選擇位置或重新輸入訊息。
        </div>`);
      } finally {
        sendButton.disabled = false;
      }
    }
    
    // 自動調整 textarea 高度
    function autoResizeTextarea() {
      const textarea = document.getElementById('userInput');
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    }
    
    // 初始化
    window.addEventListener('load', function() {
      userInput.focus();
      
      // 監聽 textarea 輸入事件來自動調整高度
      userInput.addEventListener('input', autoResizeTextarea);
      
      // Restore location bar if manual location was saved
      if (userCoords) {
        updateLocationBar();
      }

      // 顯示歡迎訊息
      setTimeout(() => {
        if (userCoords) {
          addMessage(`
            <div style="color:#1b5e20;background:#e8f5e9;padding:12px;border-radius:10px;border-left:4px solid #4caf50;">
              📍 使用上次的位置：<strong>${userCoords.address}</strong><br>
              <small>直接輸入想吃什麼即可。如需更換位置，點上方「修正」或「清除」。</small>
            </div>
          `);
        } else {
          addMessage(`
            <div style="color: #2c5aa0; background: #e3f2fd; padding: 15px; border-radius: 12px; border-left: 4px solid #2196f3;">
              <strong>🤖 歡迎使用 AI 午餐推薦系統！</strong><br><br>
              <strong>📍 點左下角的定位按鈕</strong>，自動取得您的位置，之後只要說想吃什麼就好。<br><br>
              <strong>💡 也可以手動輸入：</strong><br>
              • 地標名稱：台北101、西門町<br>
              • 詳細地址：台北市信義區<br>
              • Google Maps 分享連結<br><br>
              <small>💬 或直接開始：「台北車站附近的拉麵店」「200元以內的便當」</small>
            </div>
          `);
        }
      }, 500);

      // Auto-request geolocation on first visit (only if user hasn't set a manual location)
      setTimeout(() => {
        if (!userCoords && !localStorage.getItem('manual_location') && navigator.geolocation) {
          requestGeolocation();
        }
      }, 1500);
    });
  </script>
