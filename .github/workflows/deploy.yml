name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Test Tailscale Connection
        run: |
          echo "Testing connection to deployment server..."
          tailscale status
          ping -c 3 ${{ secrets.DEPLOY_SERVER_IP }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Ensure deploy directory and copy docker-compose.yml
        env:
          DEPLOY_SERVER_IP: ${{ secrets.DEPLOY_SERVER_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_SERVER_IP} "mkdir -p ${DEPLOY_PATH}"
          scp -i ~/.ssh/deploy_key docker-compose.yml ${DEPLOY_USER}@${DEPLOY_SERVER_IP}:${DEPLOY_PATH}/docker-compose.yml

      - name: Deploy via SSH
        env:
          DEPLOY_SERVER_IP: ${{ secrets.DEPLOY_SERVER_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_SERVER_IP} '
            set -e

            # 重試函數：最多重試 3 次，每次間隔遞增
            retry_pull() {
              local max_attempts=3
              local attempt=1
              local delay=10

              while [ $attempt -le $max_attempts ]; do
                echo "🔄 Pulling Docker images (attempt $attempt/$max_attempts)..."
                if docker compose -f docker-compose.yml pull; then
                  echo "✅ Pull successful!"
                  return 0
                fi

                if [ $attempt -lt $max_attempts ]; then
                  echo "⚠️ Pull failed, retrying in ${delay}s..."
                  sleep $delay
                  delay=$((delay * 2))
                fi
                attempt=$((attempt + 1))
              done

              echo "❌ Pull failed after $max_attempts attempts"
              return 1
            }

            echo "📁 Navigating to deployment directory..."
            cd '"${DEPLOY_PATH}"'

            retry_pull

            echo "🛑 Stopping existing containers..."
            docker compose -f docker-compose.yml down --remove-orphans --timeout 30 || true

            echo "🧹 Force removing any leftover containers..."
            docker rm -f ai-lunch-mind 2>/dev/null || true
            sleep 3

            echo "🚀 Starting updated containers..."
            docker compose -f docker-compose.yml up -d --force-recreate

            echo "🧹 Cleaning up old images..."
            docker image prune -af --filter "until=24h" || true

            echo "✅ Deployment completed successfully!"
            docker compose -f docker-compose.yml ps
          '

      - name: Health Check
        env:
          DEPLOY_SERVER_IP: ${{ secrets.DEPLOY_SERVER_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "🏥 Performing health check..."
          for i in $(seq 1 12); do
            echo "  Attempt $i/12..."
            if ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_SERVER_IP} \
              'curl -sf http://localhost:9113/health' 2>/dev/null; then
              echo ""
              echo "✅ Health check passed!"
              exit 0
            fi
            sleep 5
          done

          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_SERVER_IP} \
            'docker ps -a --filter "name=ai-lunch-mind"; docker logs ai-lunch-mind --tail 30' || true

          echo "❌ Health check failed after 60 seconds"
          exit 1

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Server**: \`${{ secrets.DEPLOY_SERVER_IP }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`ghcr.io/chuangkevin/ai-lunch-mind:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Port**: 9113" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
