services:
  ai-lunch-mind:
    image: ghcr.io/chuangkevin/ai-lunch-mind:latest
    container_name: ai-lunch-mind
    restart: unless-stopped
    ports:
      - "9113:9113"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - CACHE_DB_PATH=/app/data/cache.db
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9113/health"]
      interval: 30s
      timeout: 10s
      retries: 3
