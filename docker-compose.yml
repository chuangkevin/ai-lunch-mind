services:
  ai-lunch-mind:
    image: ghcr.io/chuangkevin/ai-lunch-mind:latest
    container_name: ai-lunch-mind
    restart: unless-stopped
    ports:
      - "9113:9113"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Taipei
      - NODE_ENV=production
      - PORT=9113
      - CACHE_DB_PATH=/app/data/cache.db
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9113/health"]
      interval: 30s
      timeout: 10s
      retries: 3
